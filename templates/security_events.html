{% extends 'partials/base.html' %}
{% block content %}
<div class="container mt-5">
    <h1>Security Events</h1>
    {% if events %}
        <table class="table">
            <thead>
                <tr>
                    <th>Time</th>
                    <th>User</th>
                    <th>Event Type</th>
                </tr>
            </thead>
            <tbody>
                {% for event in events %}
                    <tr>
                        <td>{{ event.created_at }}</td>
                        <td>{{ event.user.username }}</td>
                        <td>{{ event.event_type }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No security events recorded.</p>
    {% endif %}
</div>
{% endblock %}
